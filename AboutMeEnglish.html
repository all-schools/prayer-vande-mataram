    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-bottom: 5px solid #000;
            margin-bottom: 20px;
            padding-bottom: 20px;
        }
        .header-title {
            text-align: center;
            font-weight: bold;
            font-size: 24px;
            margin: 20px 0;
        }
        .lyrics {
            padding: 0 20px;
            line-height: 1.6;
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        .player-card {
            background-color: #fff5f5;
            margin: 15px 20px;
            padding: 10px;
            border-radius: 5px;
        }
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: monospace;
            font-size: 14px;
        }
        input[type="range"] {
            flex-grow: 1;
            margin: 0 10px;
            cursor: pointer;
        }
        .button-group {
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
            gap: 5px;
        }
        .btn {
            background: #808080; 
            color: white;
            border: 2px solid #555;
            border-radius: 25px;
            padding: 8px 0;
            width: 24%;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .btn.downloaded {
            background: #28a745 !important;
            border-color: #1e7e34;
        }
        .btn:active {
            transform: translateY(2px);
        }
        .lyrics-part { display: none; }
        .lyrics-part.active { display: block; }
    </style>
</head>

        const container = document.getElementById('stanza-container');
        let activeAudio = null;

        function processLyrics(htmlText, id) {
            const parts = htmlText.split('<hr>');
            const actualParts = parts.filter(p => p.trim() !== "");
            // part1: প্রথম অংশ, part2: দ্বিতীয় অংশ, full: তৃতীয় অংশ
            return `
                <div id="part-1-${id}" class="lyrics-part">${actualParts[0]}</div>
                <div id="part-2-${id}" class="lyrics-part active">${actualParts[1]}</div>
                <div id="part-3-${id}" class="lyrics-part">${actualParts[2]}</div>
            `;
        }

        for (let i = 1; i <= 9; i++) {
            const section = document.createElement('div');
            section.className = 'container';
            section.id = `container-${i}`;
            section.innerHTML = `
                <div class="lyrics">${processLyrics(stanzas[i-1].text, i)}</div>
                <div class="player-card">
                    <div class="progress-container">
                        <span id="current-time-${i}">0:00</span>
                        <input type="range" id="progress-${i}" value="0" min="0" max="100" oninput="seekAudio(${i})">
                        <span id="duration-${i}">0:00</span>
                    </div>
                </div>
                <div class="button-group" id="btn-group-${i}">
                    <button class="btn" id="btn-qaclip-${i}">Loading...</button>
                    <button class="btn" id="btn-qasegment-${i}">Loading...</button>
                    <button class="btn" id="btn-qclip-${i}">Loading...</button>
                    <button class="btn" id="btn-qsegment-${i}">Loading...</button>
                </div>
                <audio id="audio-${i}" preload="auto"></audio>
            `;
            container.appendChild(section);
            setupAudioEvents(i);
            preloadStanza(i);
        }

        function setupAudioEvents(id) {
            const audio = document.getElementById(`audio-${id}`);
            const progress = document.getElementById(`progress-${id}`);
            const curTimeTxt = document.getElementById(`current-time-${id}`);
            const durTimeTxt = document.getElementById(`duration-${id}`);

            audio.ontimeupdate = () => {
                const val = (audio.currentTime / audio.duration) * 100;
                progress.value = val || 0;
                curTimeTxt.innerText = formatTime(audio.currentTime);
                durTimeTxt.innerText = formatTime(audio.duration);
            };

            audio.onended = () => {
                const btnQAClip = document.getElementById(`btn-qaclip-${id}`);
                btnQAClip.innerText = "QAClip";
            };
        }

        function preloadStanza(id) {
            const btnQAClip = document.getElementById(`btn-qaclip-${id}`);
            const btnQASeg = document.getElementById(`btn-qasegment-${id}`);
            const btnQCli = document.getElementById(`btn-qclip-${id}`);
            const btnQSeg = document.getElementById(`btn-qsegment-${id}`);
            
            let qaclipRdy = false, qasegRdy = false, qcliRdy = false, qsegRdy = false;

            const checkReady = () => {
                if (qaclipRdy && qasegRdy && qcliRdy && qsegRdy) {
                    btnQAClip.innerText = "QAClip";
                    btnQAClip.onclick = () => playSong(id, 'qaclip');
                    btnQASeg.innerText = "QASegment";
                    btnQASeg.onclick = () => playSong(id, 'qasegment');
                    btnQCli.innerText = "QClip";
                    btnQCli.onclick = () => playSong(id, 'qclip');
                    btnQSeg.innerText = "QSegment";
                    btnQSeg.onclick = () => playSong(id, 'qsegment');

                    [btnQAClip, btnQASeg, btnQCli, btnQSeg].forEach(b => b.classList.add('downloaded'));
                }
            };

            new Audio(musicData[id].qaclip).oncanplaythrough = () => { qaclipRdy = true; checkReady(); };
            new Audio(musicData[id].qasegment).oncanplaythrough = () => { qasegRdy = true; checkReady(); };
            new Audio(musicData[id].qclip).oncanplaythrough = () => { qcliRdy = true; checkReady(); };
            new Audio(musicData[id].qsegment).oncanplaythrough = () => { qsegRdy = true; checkReady(); };
        }

        function playSong(id, type) {
            const audio = document.getElementById(`audio-${id}`);
            const btnQAClip = document.getElementById(`btn-qaclip-${id}`);

            document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
            document.getElementById(`container-${id}`).style.display = 'block';
            document.getElementById('main-title').style.display = 'none';

            // লিরিক্স ডিসপ্লে লজিক আপডেট
            document.querySelectorAll(`#container-${id} .lyrics-part`).forEach(p => p.classList.remove('active'));
            
            if (type === 'qaclip' || type === 'qclip') {
                document.getElementById(`part-2-${id}`).classList.add('active'); // দ্বিতীয় অংশ
            } else if (type === 'qasegment' || type === 'qsegment') {
                document.getElementById(`part-1-${id}`).classList.add('active'); // প্রথম অংশ
            }

            if (activeAudio === audio && audio.dataset.currentType === type) {
                if (!audio.paused) {
                    audio.pause();
                    btnQAClip.innerText = "Play";
                } else {
                    audio.play();
                    btnQAClip.innerText = "Pause";
                }
                return;
            }

            if (activeAudio && activeAudio !== audio) {
                stopAndResetButtons(activeAudio.id.split('-')[1]);
            }

            audio.src = musicData[id][type];
            audio.dataset.currentType = type;
            activeAudio = audio;
            audio.play();

            updateControls(id);
        }

        function updateControls(id) {
            const audio = document.getElementById(`audio-${id}`);
            const btnQAClip = document.getElementById(`btn-qaclip-${id}`);
            const btnQASeg = document.getElementById(`btn-qasegment-${id}`);
            const btnQCli = document.getElementById(`btn-qclip-${id}`);
            const btnQSeg = document.getElementById(`btn-qsegment-${id}`);

            btnQAClip.innerText = "Pause";
            btnQAClip.onclick = () => {
                if (audio.paused) { audio.play(); btnQAClip.innerText = "Pause"; }
                else { audio.pause(); btnQAClip.innerText = "Play"; }
            };

            btnQASeg.innerText = "Reset";
            btnQASeg.onclick = () => resetUI(id);

            btnQCli.innerText = "Replay";
            btnQCli.onclick = () => { audio.currentTime = 0; audio.play(); btnQAClip.innerText = "Pause"; };

            btnQSeg.innerText = "Stop"; 
            btnQSeg.onclick = () => { audio.pause(); audio.currentTime = 0; btnQAClip.innerText = "Play"; };
        }

        function stopAndResetButtons(id) {
            const audio = document.getElementById(`audio-${id}`);
            audio.pause();
            audio.currentTime = 0;
            
            const btnQAClip = document.getElementById(`btn-qaclip-${id}`);
            const btnQASeg = document.getElementById(`btn-qasegment-${id}`);
            const btnQCli = document.getElementById(`btn-qclip-${id}`);
            const btnQSeg = document.getElementById(`btn-qsegment-${id}`);
            
            btnQAClip.innerText = "QAClip";
            btnQAClip.onclick = () => playSong(id, 'qaclip');
            btnQASeg.innerText = "QASegment";
            btnQASeg.onclick = () => playSong(id, 'qasegment');
            btnQCli.innerText = "QClip";
            btnQCli.onclick = () => playSong(id, 'qclip');
            btnQSeg.innerText = "QSegment";
            btnQSeg.onclick = () => playSong(id, 'qsegment');
        }

        function resetUI(id) {
            const audio = document.getElementById(`audio-${id}`);
            audio.pause();
            audio.currentTime = 0;
            audio.dataset.currentType = "";
            activeAudio = null;

            document.querySelectorAll('.container').forEach(c => c.style.display = 'block');
            document.getElementById('main-title').style.display = 'block';

            document.querySelectorAll('.lyrics-part').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('[id^="part-2-"]').forEach(p => p.classList.add('active'));

            stopAndResetButtons(id);

            document.getElementById(`current-time-${id}`).innerText = "0:00";
            document.getElementById(`progress-${id}`).value = 0;
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' + sec : sec}`;
        }

        function seekAudio(id) {
            const audio = document.getElementById(`audio-${id}`);
            const progress = document.getElementById(`progress-${id}`);
            if (audio.duration) {
                audio.currentTime = (progress.value / 100) * audio.duration;
            }
        }
    </script>
</body>
</html>
